name: Mirror to Codeberg and GitLab

on:
  workflow_call:
    inputs:
      private:
        description: "Create missing repositories as private"
        required: false
        default: true
        type: boolean

      gitlab_visibility:
        description: "GitLab visibility: private, public, or internal"
        required: false
        default: "private"
        type: string

      mirror_mode:
        description: "Use 'mirror' to sync branches/tags with pruning, or 'branches-tags' to push branches/tags without pruning"
        required: false
        default: "mirror"
        type: string

      codeberg_url:
        description: "Codeberg base URL"
        required: false
        default: "https://codeberg.org"
        type: string

      gitlab_url:
        description: "GitLab base URL"
        required: false
        default: "https://gitlab.com"
        type: string

      codeberg_owner:
        description: "Target Codeberg user or organization. Defaults to GitHub owner."
        required: false
        default: ""
        type: string

      gitlab_namespace:
        description: "Target GitLab user or group path. Defaults to GitHub owner."
        required: false
        default: ""
        type: string

    secrets:
      CODEBERG_TOKEN:
        required: true
      GITLAB_TOKEN:
        required: true

jobs:
  mirror:
    name: Create missing repos and mirror
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout full repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive repository identity
        id: repo
        shell: bash
        env:
          CODEBERG_OWNER_INPUT: ${{ inputs.codeberg_owner }}
          GITLAB_NAMESPACE_INPUT: ${{ inputs.gitlab_namespace }}
        run: |
          set -euo pipefail

          GITHUB_OWNER="${GITHUB_REPOSITORY_OWNER}"
          REPO="${GITHUB_REPOSITORY#*/}"

          CODEBERG_OWNER="${CODEBERG_OWNER_INPUT:-$GITHUB_OWNER}"
          GITLAB_NAMESPACE="${GITLAB_NAMESPACE_INPUT:-$GITHUB_OWNER}"

          echo "github_owner=${GITHUB_OWNER}" >> "$GITHUB_OUTPUT"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          echo "codeberg_owner=${CODEBERG_OWNER}" >> "$GITHUB_OUTPUT"
          echo "gitlab_namespace=${GITLAB_NAMESPACE}" >> "$GITHUB_OUTPUT"

          echo "GitHub source: ${GITHUB_OWNER}/${REPO}"
          echo "Codeberg target: ${CODEBERG_OWNER}/${REPO}"
          echo "GitLab target: ${GITLAB_NAMESPACE}/${REPO}"

      - name: Validate inputs
        shell: bash
        env:
          MIRROR_MODE: ${{ inputs.mirror_mode }}
          GITLAB_VISIBILITY: ${{ inputs.gitlab_visibility }}
        run: |
          set -euo pipefail

          case "$MIRROR_MODE" in
            mirror|branches-tags)
              ;;
            *)
              echo "Invalid mirror_mode: $MIRROR_MODE"
              echo "Allowed values: mirror, branches-tags"
              exit 1
              ;;
          esac

          case "$GITLAB_VISIBILITY" in
            private|public|internal)
              ;;
            *)
              echo "Invalid gitlab_visibility: $GITLAB_VISIBILITY"
              echo "Allowed values: private, public, internal"
              exit 1
              ;;
          esac

      - name: Ensure Codeberg repository exists
        shell: bash
        env:
          OWNER: ${{ steps.repo.outputs.codeberg_owner }}
          REPO: ${{ steps.repo.outputs.repo }}
          CODEBERG_URL: ${{ inputs.codeberg_url }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          PRIVATE_REPO: ${{ inputs.private }}
        run: |
          set -euo pipefail

          CODEBERG_URL="${CODEBERG_URL%/}"

          echo "Checking Codeberg repository: ${OWNER}/${REPO}"

          status="$(curl -sS -o /tmp/codeberg_repo.json -w "%{http_code}" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Accept: application/json" \
            "${CODEBERG_URL}/api/v1/repos/${OWNER}/${REPO}")"

          if [ "$status" = "200" ]; then
            echo "Codeberg repository already exists: ${OWNER}/${REPO}"
            exit 0
          fi

          if [ "$status" != "404" ]; then
            echo "Unexpected Codeberg API response while checking repository: HTTP ${status}"
            cat /tmp/codeberg_repo.json || true
            exit 1
          fi

          echo "Creating Codeberg organization repository: ${OWNER}/${REPO}"

          create_status="$(curl -sS -o /tmp/codeberg_create.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${CODEBERG_URL}/api/v1/orgs/${OWNER}/repos" \
            -d "$(jq -n \
              --arg name "$REPO" \
              --argjson private "$PRIVATE_REPO" \
              '{
                name: $name,
                private: $private,
                auto_init: false,
                default_branch: "main"
              }')")"

          if [ "$create_status" != "201" ]; then
            echo "Failed to create Codeberg organization repository: HTTP ${create_status}"
            cat /tmp/codeberg_create.json || true
            exit 1
          fi

          echo "Verifying Codeberg repository exists after creation"

          verify_status="$(curl -sS -o /tmp/codeberg_verify.json -w "%{http_code}" \
            -H "Authorization: token ${CODEBERG_TOKEN}" \
            -H "Accept: application/json" \
            "${CODEBERG_URL}/api/v1/repos/${OWNER}/${REPO}")"

          if [ "$verify_status" != "200" ]; then
            echo "Codeberg repository was not found at expected path: ${OWNER}/${REPO}"
            cat /tmp/codeberg_verify.json || true
            exit 1
          fi

          echo "Codeberg repository ready: ${OWNER}/${REPO}"

      - name: Ensure GitLab repository exists
        shell: bash
        env:
          OWNER: ${{ steps.repo.outputs.gitlab_namespace }}
          REPO: ${{ steps.repo.outputs.repo }}
          GITLAB_URL: ${{ inputs.gitlab_url }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_VISIBILITY: ${{ inputs.gitlab_visibility }}
        run: |
          set -euo pipefail

          GITLAB_URL="${GITLAB_URL%/}"

          encoded_project_path="$(python3 - <<PY
          from urllib.parse import quote
          print(quote("${OWNER}/${REPO}", safe=""))
          PY
          )"

          echo "Checking GitLab repository: ${OWNER}/${REPO}"

          status="$(curl -sS -L -o /tmp/gitlab_repo.json -w "%{http_code}" \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Accept: application/json" \
            "${GITLAB_URL}/api/v4/projects/${encoded_project_path}")"

          if [ "$status" = "200" ]; then
            echo "GitLab repository already exists: ${OWNER}/${REPO}"
            exit 0
          fi

          if [ "$status" != "404" ]; then
            echo "Unexpected GitLab API response while checking repository: HTTP ${status}"
            cat /tmp/gitlab_repo.json || true
            exit 1
          fi

          encoded_namespace="$(python3 - <<PY
          from urllib.parse import quote
          print(quote("${OWNER}", safe=""))
          PY
          )"

          echo "Resolving GitLab namespace: ${OWNER}"

          namespace_status="$(curl -sS -L -o /tmp/gitlab_namespace.json -w "%{http_code}" \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Accept: application/json" \
            "${GITLAB_URL}/api/v4/namespaces/${encoded_namespace}")"

          if [ "$namespace_status" != "200" ]; then
            echo "Failed to resolve GitLab namespace '${OWNER}': HTTP ${namespace_status}"
            cat /tmp/gitlab_namespace.json || true
            exit 1
          fi

          namespace_id="$(jq -r '.id' /tmp/gitlab_namespace.json)"

          if [ -z "$namespace_id" ] || [ "$namespace_id" = "null" ]; then
            echo "Could not read GitLab namespace id for '${OWNER}'"
            cat /tmp/gitlab_namespace.json || true
            exit 1
          fi

          echo "Creating GitLab repository: ${OWNER}/${REPO} in namespace ${namespace_id}"

          create_status="$(curl -sS -L -o /tmp/gitlab_create.json -w "%{http_code}" \
            -X POST \
            -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            "${GITLAB_URL}/api/v4/projects" \
            -d "$(jq -n \
              --arg name "$REPO" \
              --arg path "$REPO" \
              --arg visibility "$GITLAB_VISIBILITY" \
              --argjson namespace_id "$namespace_id" \
              '{
                name: $name,
                path: $path,
                visibility: $visibility,
                namespace_id: $namespace_id,
                initialize_with_readme: false
              }')")"

          if [ "$create_status" = "201" ]; then
            echo "GitLab repository created: ${OWNER}/${REPO}"
            exit 0
          fi

          if [ "$create_status" = "400" ] || [ "$create_status" = "409" ]; then
            echo "GitLab repository may already exist. Verifying..."

            verify_status="$(curl -sS -L -o /tmp/gitlab_verify.json -w "%{http_code}" \
              -H "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
              -H "Accept: application/json" \
              "${GITLAB_URL}/api/v4/projects/${encoded_project_path}")"

            if [ "$verify_status" = "200" ]; then
              echo "GitLab repository already exists after verification: ${OWNER}/${REPO}"
              exit 0
            fi
          fi

          echo "Failed to create GitLab repository: HTTP ${create_status}"
          cat /tmp/gitlab_create.json || true
          exit 1

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add mirror remotes
        shell: bash
        env:
          CODEBERG_OWNER: ${{ steps.repo.outputs.codeberg_owner }}
          GITLAB_NAMESPACE: ${{ steps.repo.outputs.gitlab_namespace }}
          REPO: ${{ steps.repo.outputs.repo }}
          CODEBERG_URL: ${{ inputs.codeberg_url }}
          GITLAB_URL: ${{ inputs.gitlab_url }}
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          set -euo pipefail

          CODEBERG_HOST="$(echo "${CODEBERG_URL}" | sed -E 's#^https?://##; s#/$##')"
          GITLAB_HOST="$(echo "${GITLAB_URL}" | sed -E 's#^https?://##; s#/$##')"

          git remote add codeberg "https://${CODEBERG_OWNER}:${CODEBERG_TOKEN}@${CODEBERG_HOST}/${CODEBERG_OWNER}/${REPO}.git"
          git remote add gitlab "https://oauth2:${GITLAB_TOKEN}@${GITLAB_HOST}/${GITLAB_NAMESPACE}/${REPO}.git"

      - name: Mirror branches and tags to Codeberg
        shell: bash
        env:
          MIRROR_MODE: ${{ inputs.mirror_mode }}
        run: |
          set -euo pipefail

          if [ "$MIRROR_MODE" = "mirror" ]; then
            git push --prune codeberg \
              '+refs/heads/*:refs/heads/*' \
              '+refs/tags/*:refs/tags/*'
          else
            git push codeberg '+refs/heads/*:refs/heads/*'
            git push codeberg '+refs/tags/*:refs/tags/*'
          fi

      - name: Mirror branches and tags to GitLab
        shell: bash
        env:
          MIRROR_MODE: ${{ inputs.mirror_mode }}
        run: |
          set -euo pipefail

          if [ "$MIRROR_MODE" = "mirror" ]; then
            git push --prune gitlab \
              '+refs/heads/*:refs/heads/*' \
              '+refs/tags/*:refs/tags/*'
          else
            git push gitlab '+refs/heads/*:refs/heads/*'
            git push gitlab '+refs/tags/*:refs/tags/*'
          fi
