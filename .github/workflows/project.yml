name: Release and Dispatch
run-name: Release ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
    secrets:
      IANHUB_AGENT_APP_ID:
        required: true
      IANHUB_AGENT_PRIVATE_KEY:
        required: true

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Project Release
    runs-on: ubuntu-latest

    concurrency:
      group: release-${{ github.workflow }}-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: 1️⃣ Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 2️⃣ Create ianhub-agent token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.IANHUB_AGENT_APP_ID }}
          private-key: ${{ secrets.IANHUB_AGENT_PRIVATE_KEY }}
          owner: ianhubnet

      - name: 3️⃣ Configure GitHub auth and identity
        shell: bash
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"
          git config --global user.name "ianhub-agent[bot]"
          git config --global user.email "ianhub-agent[bot]@users.noreply.github.com"

      - name: 4️⃣ Set up variables
        id: vars
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          NAME="${{ inputs.name }}"
          ZIP_NAME="${NAME}-${TAG_NAME}.zip"
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "zip=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: 5️⃣ Prepare ZIP contents
        run: |
          if [ ! -d "src" ]; then
            echo "::error::src not found"
            exit 1
          fi

          mkdir "${{ steps.vars.outputs.name }}"
          cp -r src/* "${{ steps.vars.outputs.name }}/"

          for f in README.md LICENSE.md; do
            if [ -f "$f" ]; then
              cp "$f" "${{ steps.vars.outputs.name }}/"
            fi
          done

      - name: 6️⃣ Create ZIP archive
        run: |
          zip -r "${{ steps.vars.outputs.zip }}" "${{ steps.vars.outputs.name }}"

      - name: 7️⃣ Create GitHub Release and Upload ZIP
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: ${{ steps.vars.outputs.zip }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  dispatch:
    name: Notify Projects
    runs-on: ubuntu-latest
    needs: release

    concurrency:
      group: dispatch-${{ github.workflow }}-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Create ianhub-agent token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.IANHUB_AGENT_APP_ID }}
          private-key: ${{ secrets.IANHUB_AGENT_PRIVATE_KEY }}
          owner: ianhubnet

      - name: Trigger update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ianhubnet/csk-projects
          event-type: update-submodules
          client-payload: |
            {
              "name": "${{ inputs.name }}",
              "repo": "${{ github.repository }}"
            }
